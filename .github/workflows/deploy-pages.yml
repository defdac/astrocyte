name: Deploy Astrocyte to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v5

      - name: Installera Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Installera beroenden
        run: npm install

      - name: Bygg projektet (Vite)
        run: npm run build

      - name: Ladda upp till GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy
        uses: actions/deploy-pages@v4
